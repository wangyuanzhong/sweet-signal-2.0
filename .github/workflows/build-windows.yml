# Build Windows exe and publish as downloadable artifact (GitHub Actions).
#
# How to download the exe after a workflow run:
# 1. Open the repo on GitHub → Actions
# 2. Click the latest successful "Build Windows exe" workflow run
# 3. Scroll to "Artifacts" at the bottom of the summary page
# 4. Download "SweetSignal-Windows" (.zip containing SweetSignal.exe)
#
# Notes:
# - Artifacts expire after retention period (repository/org default).
# - For public releases that do not expire, add a Release job on tag pushes.
# - Pushes to cursor/** (e.g. Cursor Cloud agent branches) also trigger builds.

name: Build Windows exe

on:
  push:
    branches:
      - main
      - master
      - "cursor/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        working-directory: desktop_app
        run: python -m PyInstaller --noconfirm SweetSignal.spec

      - name: Archive executable for artifact
        shell: pwsh
        run: |
          $exe = Join-Path "${{ github.workspace }}" "desktop_app" "dist" "SweetSignal.exe"
          if (-not (Test-Path $exe)) { throw "Expected $exe missing" }
          Compress-Archive -Path $exe -DestinationPath "${{ github.workspace }}\SweetSignal-Windows.zip" -Force

      - name: Upload artifact (ZIP with exe inside)
        uses: actions/upload-artifact@v4
        with:
          name: SweetSignal-Windows
          path: SweetSignal-Windows.zip
          if-no-files-found: error
